<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>フリマ販売管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #f7f6f3;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.15);
  --text: #1a1a18;
  --text-2: #6b6b65;
  --text-3: #a8a8a2;
  --accent: #2a5cff;
  --accent-light: #eef1ff;
  --pay-bg: #fff1ef;
  --pay-text: #c0391b;
  --mer-bg: #edf7f0;
  --mer-text: #1a7a3c;
  --other-bg: #f2eeff;
  --other-text: #5b3fc2;
  --exp-bg: #e8f0ff;
  --exp-text: #3730a3;
  --undo-bg: #fdf4e7;
  --undo-text: #8a5a00;
  --danger: #d93025;
  --radius: 10px;
  --radius-lg: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  --font: 'Noto Sans JP', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
  -webkit-text-size-adjust: 100%;
}

/* Layout */
.app {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 0 80px;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(247,246,243,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-logo {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text);
  flex: 1;
}
.header-logo span { color: var(--accent); }
.btn-add {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 9px 16px;
  font-size: 14px;
  font-family: var(--font);
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.btn-add:hover { opacity: 0.88; }
.btn-add:active { transform: scale(0.97); }

/* Stats */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 16px 20px 0;
}
.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 10px;
  text-align: center;
}
.stat-label {
  font-size: 11px;
  color: var(--text-2);
  margin-bottom: 4px;
  white-space: nowrap;
}
.stat-val {
  font-size: 24px;
  font-weight: 700;
  font-family: var(--mono);
  color: var(--text);
  letter-spacing: -1px;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  padding: 16px 20px 0;
  border-bottom: 1px solid var(--border);
}
.tab {
  padding: 10px 14px;
  font-size: 13px;
  font-family: var(--font);
  cursor: pointer;
  color: var(--text-2);
  border: none;
  background: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.15s;
  font-weight: 500;
  white-space: nowrap;
}
.tab:hover { color: var(--text); }
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* Page */
.page { display: none; padding: 16px 20px 0; }
.page.active { display: block; }

/* Filters */
.filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.filter-btn {
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  font-family: var(--font);
  cursor: pointer;
  color: var(--text-2);
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* Bulk bar */
.bulk-bar {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--accent-light);
  border: 1px solid rgba(42,92,255,0.2);
  border-radius: var(--radius);
  margin-bottom: 10px;
  position: sticky;
  top: 56px;
  z-index: 10;
}
.bulk-bar.show { display: flex; }
.bulk-count { font-size: 13px; color: var(--accent); flex: 1; font-weight: 500; }
.btn-sm {
  border-radius: 7px;
  padding: 7px 14px;
  font-size: 12px;
  font-family: var(--font);
  cursor: pointer;
  border: 1px solid var(--border-strong);
  background: var(--surface);
  color: var(--text-2);
  transition: all 0.15s;
}
.btn-sm:hover { background: var(--surface2); }
.btn-sm-danger {
  background: #fff1f0;
  color: var(--danger);
  border-color: rgba(217,48,37,0.2);
  font-weight: 500;
}
.btn-sm-danger:hover { background: #ffe0de; }
.btn-sm-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  font-weight: 500;
}
.btn-sm-primary:hover { opacity: 0.88; }

/* Item list */
.list { display: flex; flex-direction: column; gap: 6px; }
.item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: border-color 0.15s, background 0.15s;
}
.item.checked {
  border-color: rgba(42,92,255,0.35);
  background: var(--accent-light);
}
.cb {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
  cursor: pointer;
  accent-color: var(--accent);
  border-radius: 4px;
}
.badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.2px;
}
.badge-paypay { background: var(--pay-bg); color: var(--pay-text); }
.badge-mercari { background: var(--mer-bg); color: var(--mer-text); }
.badge-other { background: var(--other-bg); color: var(--other-text); }
.item-code {
  font-size: 15px;
  font-weight: 600;
  font-family: var(--mono);
  color: var(--text);
  letter-spacing: -0.3px;
  word-break: break-all;
}
.item-sub {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 1px;
  word-break: break-all;
}
.item-date { font-size: 11px; color: var(--text-3); white-space: nowrap; }
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-3);
  font-size: 14px;
}
.empty-icon { font-size: 32px; margin-bottom: 8px; }

/* History page */
.hist-toolbar {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  margin-bottom: 12px;
}
.btn-clear {
  background: none;
  border: 1px solid var(--border-strong);
  border-radius: 7px;
  padding: 6px 12px;
  font-size: 12px;
  font-family: var(--font);
  cursor: pointer;
  color: var(--text-3);
}
.btn-clear:hover { color: var(--danger); border-color: rgba(217,48,37,0.3); }
.hist-group { margin-bottom: 16px; }
.hist-date-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-3);
  padding: 4px 0 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
}
.hist-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
}
.hist-item:last-child { border-bottom: none; }
.hist-action {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.3px;
}
.hist-add { background: var(--mer-bg); color: var(--mer-text); }
.hist-export { background: var(--exp-bg); color: var(--exp-text); }
.hist-undo { background: var(--undo-bg); color: var(--undo-text); }
.hist-del { background: #fff1f0; color: var(--danger); }
.hist-code { font-size: 13px; font-family: var(--mono); font-weight: 600; color: var(--text); flex: 1; word-break: break-all; }
.hist-plat { font-size: 11px; color: var(--text-2); white-space: nowrap; }
.hist-time { font-size: 11px; color: var(--text-3); white-space: nowrap; }
.btn-undo {
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: 7px;
  padding: 6px 10px;
  font-size: 11px;
  font-family: var(--font);
  cursor: pointer;
  color: var(--text-2);
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.btn-undo:hover:not(:disabled) {
  background: var(--accent-light);
  color: var(--accent);
  border-color: rgba(42,92,255,0.3);
}
.btn-undo:disabled { opacity: 0.35; cursor: default; }
.btn-undo.undone {
  background: var(--surface2);
  color: var(--text-3);
  font-size: 10px;
}

/* Modal */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 24px;
  width: min(360px, 100%);
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  animation: modal-in 0.18s ease;
}
@keyframes modal-in {
  from { transform: translateY(8px) scale(0.98); opacity: 0; }
  to { transform: none; opacity: 1; }
}
.modal-title {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--text);
}
.field { margin-bottom: 14px; }
.field label {
  font-size: 12px;
  color: var(--text-2);
  display: block;
  margin-bottom: 5px;
  font-weight: 500;
}
.field-hint {
  font-weight: 400;
  color: var(--text-3);
  font-size: 11px;
  margin-left: 4px;
}
.field input, .field select {
  width: 100%;
  padding: 11px 12px;
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  font-size: 16px;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  transition: border-color 0.15s;
}
.field input:focus, .field select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(42,92,255,0.12);
}
.field input.mono { font-family: var(--mono); letter-spacing: -0.3px; }
.other-field { display: none; margin-top: 8px; }
.other-field.show { display: block; }
.modal-btns { display: flex; gap: 8px; margin-top: 20px; }
.btn-modal-cancel {
  flex: 1;
  padding: 12px;
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  font-size: 14px;
  font-family: var(--font);
  cursor: pointer;
  background: none;
  color: var(--text-2);
}
.btn-modal-cancel:hover { background: var(--surface2); }
.btn-modal-save {
  flex: 2;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-family: var(--font);
  font-weight: 700;
  cursor: pointer;
  background: var(--accent);
  color: #fff;
  transition: opacity 0.15s;
}
.btn-modal-save:hover { opacity: 0.88; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: #1a1a18;
  color: #fff;
  padding: 11px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 999;
  max-width: calc(100vw - 40px);
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

/* Responsive */
@media (max-width: 480px) {
  .stats { grid-template-columns: repeat(2,1fr); }
  .hist-plat { display: none; }
  .stat-val { font-size: 20px; }
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-logo">フリマ<span>管理</span></div>
    <button class="btn-add" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      追加
    </button>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-label">在庫件数</div><div class="stat-val" id="s-total">0</div></div>
    <div class="stat"><div class="stat-label">ペイペイ</div><div class="stat-val" id="s-pay">0</div></div>
    <div class="stat"><div class="stat-label">メルカリ</div><div class="stat-val" id="s-mer">0</div></div>
    <div class="stat"><div class="stat-label">書出済</div><div class="stat-val" id="s-exp">0</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('list',this)">一覧</button>
    <button class="tab" onclick="switchTab('exported',this)">書き出し済み</button>
    <button class="tab" onclick="switchTab('hist',this)">操作履歴</button>
  </div>

  <!-- 一覧 -->
  <div id="page-list" class="page active">
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
      <button class="filter-btn" onclick="setFilter('paypay',this)">ペイペイ</button>
      <button class="filter-btn" onclick="setFilter('mercari',this)">メルカリ</button>
      <button class="filter-btn" onclick="setFilter('other',this)">その他</button>
    </div>
    <div class="bulk-bar" id="bulk-bar">
      <span class="bulk-count" id="bulk-count">0件選択中</span>
      <button class="btn-sm" onclick="clearChecks()">解除</button>
      <button class="btn-sm btn-sm-primary" onclick="bulkExport()">CSVに書き出す</button>
    </div>
    <div class="list" id="list"></div>
  </div>

  <!-- 書き出し済み -->
  <div id="page-exported" class="page">
    <div class="bulk-bar" id="exp-bulk-bar">
      <span class="bulk-count" id="exp-bulk-count">0件選択中</span>
      <button class="btn-sm" onclick="clearExpChecks()">解除</button>
      <button class="btn-sm btn-sm-danger" onclick="bulkDelete()">削除</button>
    </div>
    <div class="list" id="exp-list"></div>
  </div>

  <!-- 操作履歴 -->
  <div id="page-hist" class="page">
    <div class="hist-toolbar">
      <button class="btn-clear" onclick="clearHist()">履歴をクリア</button>
    </div>
    <div id="hist-list"></div>
  </div>
</div>

<!-- 追加モーダル -->
<div class="modal-bg" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">商品を追加</div>
    <div class="field">
      <label>プラットフォーム</label>
      <select id="m-plat" onchange="toggleOther()">
        <option value="paypay">PayPayフリマ</option>
        <option value="mercari">メルカリ</option>
        <option value="other">その他</option>
      </select>
      <div class="other-field" id="other-wrap">
        <input id="m-other-name" type="text" placeholder="プラットフォーム名 (英数字・カタカナ)" autocomplete="off"/>
      </div>
    </div>
    <div class="field">
      <label>管理番号<span class="field-hint">英数字・カタカナのみ</span></label>
      <input id="m-code" type="text" class="mono" placeholder="例: hp012" autocomplete="off"/>
    </div>
    <div class="field">
      <label>発送方法</label>
      <select id="m-shipping" onchange="toggleShippingOther()">
        <option value="ゆうパケットポストmini">ゆうパケットポストmini</option>
        <option value="other">その他</option>
      </select>
      <div class="other-field" id="shipping-other-wrap">
        <input id="m-shipping-other" type="text" placeholder="発送方法を入力" autocomplete="off"/>
      </div>
    </div>
    <div class="field">
      <label>販売価格</label>
      <div style="position:relative">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-2);font-size:14px">¥</span>
        <input id="m-price" type="number" inputmode="numeric" min="0" placeholder="0" style="padding-left:28px" autocomplete="off"/>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-modal-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-modal-save" onclick="addItem()">追加する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PLAT_BADGE = { paypay:'badge-paypay', mercari:'badge-mercari', other:'badge-other' };
const ACTION_LABEL = { add:'追加', export:'書出', del:'削除', undo:'取消' };
const ACTION_CLASS = { add:'hist-add', export:'hist-export', del:'hist-del', undo:'hist-undo' };
const VALID_RE = /^[A-Za-z0-9ァ-ヶー]+$/;
const STORAGE_KEY = 'furima_data_v1';

function platKey(p){ return (p==='paypay'||p==='mercari') ? p : 'other'; }
function nowStr(){ const n=new Date(); return { date:n.toISOString().slice(0,10), time:n.toTimeString().slice(0,5) }; }
function escHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// --- Storage ---
function load(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    const data = JSON.parse(raw);
    // 旧形式 soldItems → 新形式 exportedItems への移行
    if(Array.isArray(data.soldItems) && !Array.isArray(data.exportedItems)){
      data.exportedItems = data.soldItems.map(i => {
        const x = {...i};
        x.exportedDate = i.soldDate || i.exportedDate || '';
        x.exportedTime = i.soldTime || i.exportedTime || '';
        delete x.soldDate;
        delete x.soldTime;
        return x;
      });
      delete data.soldItems;
    }
    if(!Array.isArray(data.exportedItems)) data.exportedItems = [];
    // 旧形式 historyLog の action 名を移行（'sold' → 'export'）。snap は破棄。
    if(Array.isArray(data.historyLog)){
      data.historyLog = data.historyLog.map(h => {
        const e = {...h};
        if(e.action === 'sold') e.action = 'export';
        delete e.snap;
        return e;
      });
    }
    return data;
  } catch(e){ return null; }
}
function save(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      items, exportedItems, historyLog, nextId, nextHid
    }));
  } catch(e){}
}

// --- State ---
const saved = load();
let items = saved && Array.isArray(saved.items) ? saved.items : [];
let exportedItems = saved && Array.isArray(saved.exportedItems) ? saved.exportedItems : [];
let historyLog = saved && Array.isArray(saved.historyLog) ? saved.historyLog : [];
let nextId = saved && saved.nextId ? saved.nextId : 1;
let nextHid = saved && saved.nextHid ? saved.nextHid : 1;
let checkedList = new Set();
let checkedExp = new Set();
let filter = 'all';

// Toast
let toastTimer = null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2400);
}

// --- Render ---
function renderStats(){
  document.getElementById('s-total').textContent = items.length;
  document.getElementById('s-pay').textContent = items.filter(i=>i.plat==='paypay').length;
  document.getElementById('s-mer').textContent = items.filter(i=>i.plat==='mercari').length;
  document.getElementById('s-exp').textContent = exportedItems.length;
}

function renderList(){
  const show = filter==='all' ? items : items.filter(i => filter==='other' ? platKey(i.plat)==='other' : i.plat===filter);
  const el = document.getElementById('list');
  if(!show.length){
    el.innerHTML = '<div class="empty"><div class="empty-icon">📦</div>商品がありません</div>';
  } else {
    el.innerHTML = show.map(i => `
      <div class="item${checkedList.has(i.id)?' checked':''}">
        <input type="checkbox" class="cb" ${checkedList.has(i.id)?'checked':''} onchange="toggleCheckList(${i.id},this)"/>
        <span class="badge ${PLAT_BADGE[platKey(i.plat)]}">${escHtml(i.platLabel)}</span>
        <div style="flex:1;min-width:0">
          <div class="item-code">${escHtml(i.code)}</div>
          <div class="item-sub">${escHtml(i.shipping||'—')}${i.price!=null?' · ¥'+Number(i.price).toLocaleString():''}</div>
        </div>
        <span class="item-date">${(i.date||'').replace(/-/g,'/')}</span>
      </div>
    `).join('');
  }
  const bar = document.getElementById('bulk-bar');
  if(checkedList.size > 0){
    bar.classList.add('show');
    document.getElementById('bulk-count').textContent = checkedList.size + '件選択中';
  } else {
    bar.classList.remove('show');
  }
}

function renderExp(){
  const el = document.getElementById('exp-list');
  if(!exportedItems.length){
    el.innerHTML = '<div class="empty"><div class="empty-icon">📤</div>書き出し済みの商品はありません</div>';
  } else {
    const sorted = [...exportedItems].sort((a,b) => {
      const ka = (a.exportedDate||'') + (a.exportedTime||'');
      const kb = (b.exportedDate||'') + (b.exportedTime||'');
      return kb.localeCompare(ka);
    });
    el.innerHTML = sorted.map(i => `
      <div class="item${checkedExp.has(i.id)?' checked':''}">
        <input type="checkbox" class="cb" ${checkedExp.has(i.id)?'checked':''} onchange="toggleCheckExp(${i.id},this)"/>
        <span class="badge ${PLAT_BADGE[platKey(i.plat)]}">${escHtml(i.platLabel)}</span>
        <div style="flex:1;min-width:0">
          <div class="item-code">${escHtml(i.code)}</div>
          <div class="item-sub">${escHtml(i.shipping||'—')}${i.price!=null?' · ¥'+Number(i.price).toLocaleString():''}</div>
        </div>
        <span class="item-date">${(i.exportedDate||'').replace(/-/g,'/')}</span>
      </div>
    `).join('');
  }
  const bar = document.getElementById('exp-bulk-bar');
  if(checkedExp.size > 0){
    bar.classList.add('show');
    document.getElementById('exp-bulk-count').textContent = checkedExp.size + '件選択中';
  } else {
    bar.classList.remove('show');
  }
}

function renderHist(){
  const el = document.getElementById('hist-list');
  if(!historyLog.length){
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>履歴がありません</div>';
    return;
  }
  const byDate = {};
  [...historyLog].reverse().forEach(h => {
    const d = h.date || '----/--/--';
    if(!byDate[d]) byDate[d] = [];
    byDate[d].push(h);
  });
  el.innerHTML = Object.entries(byDate).map(([date, entries]) => `
    <div class="hist-group">
      <div class="hist-date-label">${date.replace(/-/g,'/')}</div>
      ${entries.map(h => {
        const canUndo = !!h.item && !h.undone && h.action !== 'undo';
        const code = (h.item ? h.item.code : h.code) || '';
        const platLabel = (h.item ? h.item.platLabel : h.platLabel) || '';
        return `<div class="hist-item">
          <span class="hist-action ${ACTION_CLASS[h.action]||'hist-add'}">${ACTION_LABEL[h.action]||h.action}</span>
          <span class="hist-code">${escHtml(code)}</span>
          <span class="hist-plat">${escHtml(platLabel)}</span>
          <span class="hist-time">${escHtml(h.time||'')}</span>
          <button class="btn-undo${h.undone?' undone':''}" onclick="undoEntry(${h.hid})" ${canUndo?'':'disabled'}>
            ${h.undone ? '取消済' : canUndo ? '↩ 元に戻す' : '—'}
          </button>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

function render(){ renderStats(); renderList(); renderExp(); renderHist(); }

// --- Checks ---
function toggleCheckList(id,el){ if(el.checked) checkedList.add(id); else checkedList.delete(id); renderList(); }
function clearChecks(){ checkedList.clear(); renderList(); }
function toggleCheckExp(id,el){ if(el.checked) checkedExp.add(id); else checkedExp.delete(id); renderExp(); }
function clearExpChecks(){ checkedExp.clear(); renderExp(); }

// --- Filter / Tab ---
function setFilter(f, el){
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  checkedList.clear();
  renderList();
}
function switchTab(tab, el){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
}

// --- Modal ---
function toggleOther(){
  const v = document.getElementById('m-plat').value;
  document.getElementById('other-wrap').classList.toggle('show', v === 'other');
  if(v === 'other') document.getElementById('m-other-name').focus();
}
function toggleShippingOther(){
  const v = document.getElementById('m-shipping').value;
  document.getElementById('shipping-other-wrap').classList.toggle('show', v === 'other');
  if(v === 'other') document.getElementById('m-shipping-other').focus();
}
function openModal(){
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('m-code').focus(), 50);
}
function closeModal(e){
  if(!e || e.target === document.getElementById('modal'))
    document.getElementById('modal').classList.remove('open');
}

// --- Add ---
function addItem(){
  const code = document.getElementById('m-code').value.trim();
  const platVal = document.getElementById('m-plat').value;

  if(!code){
    document.getElementById('m-code').focus();
    showToast('管理番号を入力してください');
    return;
  }
  if(!VALID_RE.test(code)){
    document.getElementById('m-code').focus();
    showToast('管理番号は英数字とカタカナのみ使えます');
    return;
  }

  let plat, platLabel;
  if(platVal === 'paypay'){ plat = 'paypay'; platLabel = 'ペイペイフリマ'; }
  else if(platVal === 'mercari'){ plat = 'mercari'; platLabel = 'メルカリ'; }
  else {
    const n = document.getElementById('m-other-name').value.trim();
    if(n && !VALID_RE.test(n)){
      document.getElementById('m-other-name').focus();
      showToast('プラットフォーム名は英数字とカタカナのみ使えます');
      return;
    }
    plat = 'other';
    platLabel = n || 'その他';
  }

  const shippingVal = document.getElementById('m-shipping').value;
  const shipping = shippingVal === 'other'
    ? (document.getElementById('m-shipping-other').value.trim() || 'その他')
    : shippingVal;
  const priceRaw = document.getElementById('m-price').value;
  const price = priceRaw !== '' ? parseInt(priceRaw, 10) : null;

  const {date, time} = nowStr();
  const item = { id: nextId++, plat, platLabel, code, shipping, price, date, time };
  items.unshift(item);
  historyLog.push({
    hid: nextHid++,
    action: 'add',
    item: {...item},
    date, time,
    undone: false
  });

  // Reset form
  document.getElementById('m-code').value = '';
  document.getElementById('m-other-name').value = '';
  document.getElementById('m-plat').value = 'paypay';
  document.getElementById('m-shipping').value = 'ゆうパケットポストmini';
  document.getElementById('m-shipping-other').value = '';
  document.getElementById('m-price').value = '';
  document.getElementById('other-wrap').classList.remove('show');
  document.getElementById('shipping-other-wrap').classList.remove('show');
  document.getElementById('modal').classList.remove('open');

  save(); render();
  showToast('「' + code + '」を追加しました');
}

// --- Bulk export (CSV + 移動) ---
function bulkExport(){
  if(!checkedList.size) return;
  const target = items.filter(i => checkedList.has(i.id));
  if(!target.length) return;

  // CSV 生成（プラットフォーム / 管理番号 / 発送方法 / 販売価格 / 登録日）
  const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
  const rows = [['プラットフォーム','管理番号','発送方法','販売価格','登録日']];
  target.forEach(i => {
    rows.push([
      i.platLabel || '',
      i.code || '',
      i.shipping || '',
      i.price != null ? i.price : '',
      (i.date || '').replace(/-/g,'/')
    ]);
  });
  const bom = '﻿';
  const csv = bom + rows.map(r => r.map(v => '"' + String(v).replace(/"/g,'""') + '"').join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `フリマ管理_${today}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);

  // exportedItems へ移動 + 1件ずつ履歴を記録
  const {date, time} = nowStr();
  target.forEach(item => {
    const exported = {...item, exportedDate: date, exportedTime: time};
    exportedItems.push(exported);
    historyLog.push({
      hid: nextHid++,
      action: 'export',
      item: {...exported},
      date, time,
      undone: false
    });
  });
  items = items.filter(i => !checkedList.has(i.id));
  checkedList.clear();
  save(); render();
  showToast(target.length + '件をCSV書き出ししました');
}

// --- Bulk delete (書き出し済みページ) ---
function bulkDelete(){
  if(!checkedExp.size) return;
  if(!confirm(checkedExp.size + '件を削除しますか？\n（操作履歴から元に戻せます）')) return;

  const target = exportedItems.filter(i => checkedExp.has(i.id));
  const {date, time} = nowStr();
  target.forEach(item => {
    historyLog.push({
      hid: nextHid++,
      action: 'del',
      item: {...item},
      date, time,
      undone: false
    });
  });
  exportedItems = exportedItems.filter(i => !checkedExp.has(i.id));
  checkedExp.clear();
  save(); render();
  showToast(target.length + '件を削除しました');
}

// --- Undo (1件ずつ) ---
function undoEntry(hid){
  const entry = historyLog.find(h => h.hid === hid);
  if(!entry || entry.undone || entry.action === 'undo' || !entry.item) return;

  const id = entry.item.id;
  let ok = false;

  if(entry.action === 'add'){
    // どこにあっても削除（在庫 or 書出済）
    const beforeI = items.length, beforeE = exportedItems.length;
    items = items.filter(i => i.id !== id);
    exportedItems = exportedItems.filter(i => i.id !== id);
    ok = items.length < beforeI || exportedItems.length < beforeE;
  } else if(entry.action === 'export'){
    // 書出済から在庫へ戻す
    const found = exportedItems.find(i => i.id === id);
    if(found){
      const restored = {...found};
      delete restored.exportedDate;
      delete restored.exportedTime;
      exportedItems = exportedItems.filter(i => i.id !== id);
      items.unshift(restored);
      ok = true;
    }
  } else if(entry.action === 'del'){
    // 削除を取り消して書出済に復元（既に存在していればスキップ）
    const exists = exportedItems.find(i => i.id === id) || items.find(i => i.id === id);
    if(!exists){
      exportedItems.push({...entry.item});
      ok = true;
    }
  }

  if(!ok){
    showToast('元に戻せませんでした');
    return;
  }

  entry.undone = true;
  const {date, time} = nowStr();
  historyLog.push({
    hid: nextHid++,
    action: 'undo',
    item: {...entry.item},
    date, time,
    undone: false
  });
  save(); render();
  showToast('「' + (entry.item.code||'') + '」を元に戻しました');
}

function clearHist(){
  if(!confirm('操作履歴をすべて削除しますか？')) return;
  historyLog = [];
  save();
  renderHist();
}

// --- Listeners ---
document.getElementById('m-code').addEventListener('keydown', e => { if(e.key === 'Enter') addItem(); });
document.getElementById('m-price').addEventListener('keydown', e => { if(e.key === 'Enter') addItem(); });
document.getElementById('m-other-name').addEventListener('keydown', e => { if(e.key === 'Enter') document.getElementById('m-code').focus(); });
document.getElementById('m-shipping-other').addEventListener('keydown', e => { if(e.key === 'Enter') document.getElementById('m-price').focus(); });
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

render();
</script>
